<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIKASH</title>

    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom styling -->
    <link rel="stylesheet" href="./assets/css/util.css">
    <link rel="stylesheet" href="./assets/css/animation.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <style>
        .btn-contact {
            background-color: green;
            color: white;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }

        .btn-contact:hover {
            background-color: mediumslateblue;
        }

        /* Example media query for smaller screens */
        @media only screen and (max-width: 600px) {
            .logo {
                width: 100px;
            }
        }

        /* Style for visitor count in the footer */
        footer {
            position: fixed;
            left: 20px;
            bottom: 20px;
            font-size: 14px;
            color: orangered;
        }

        /* Loading screen styles */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <div class="loading-screen" id="loadingScreen">
        <iframe src="./assets/Loading form/index.html" frameborder="0" style="width: 100%; height: 100%;"></iframe>
    </div>

    <div class="wrapper" style="display: none;" id="mainContent">
        <!-- Header -->
        <header>
            <img class="logo" src="./assets/img/logo.png" width="100" alt="VIKASH" />
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="./assets/About/index.html">About</a></li>
                    <li><a href="projects">Projects</a></li>
                </ul>
            </nav>
            <a class="btn-contact" href="./assets/Contact form/index.html">
                <i class="fa fa-envelope-o"></i> Contact Us
            </a>
        </header>
        <!-- End Header -->

        <!-- Main Content -->
        <main class="content">
            <div class="hero-info m-50" style="flex-basis: 640px;">
                <h1>Connecting the dots in the <span class="locale">digital world</span></h1>
                <p>Where innovation meets the web <a href="https://internet.org" target="_blank">Internet</a>,
                    "Connecting you to the digital world. Crafting online experiences that captivate. Innovating the
                    web, one click at a time."</p>
                <a class="btn btn-outline" href="https://github.com/Vikash888" target="_blank"> <i
                        class="fa-brands fa-github"></i> GitHub 
                </a>
                <div class="social-links">
                    <ul>
                        <li><a href="https://www.facebook.com/profile.php?id=100013994083962&mibextid=ZbWKwL"
                                target="_blank" class="btn-social bg-facebook">
                                <i class="fa-brands fa-facebook-f"></i>
                            </a></li>
                        <li><a href="https://youtube.com/@vikash.j3497" target="_blank"
                                class="btn-social bg-youtube">
                                <i class="fa-brands fa-youtube"></i>
                            </a></li>
                        <li><a href="https://www.instagram.com/crazy_v_i_c_k_y__?igsh=MXZzaGI5dXZ2ZDJzbg=="
                                target="_blank" class="btn-social bg-instagram">
                                <i class="fa-brands fa-instagram"></i>
                            </a></li>
                        <li><a href="http://www.linkedin.com/in/vikash-j-5b5056228" target="_blank"
                                class="btn-social bg-linkedin">
                                <i class="fa-brands fa-linkedin"></i>
                            </a></li>
                    </ul>
                </div>
            </div>
            <img src="assets/img/WEB.png" alt="Web Development Illustration">
        </main>
        <!-- End Main Content -->

        <!-- Footer -->
        <footer>
            <p>Client IP: <span id="Clientip">Fetching...</span></p>
            <p>Total Visitors: <span id="visitorCount">0</span></p>
        </footer>
        <!-- End Footer -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 1000);

            fetch('/api/visitor-info')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('Clientip').textContent = data.ip;
                    updateVisitorCount();
                })
                .catch(error => console.error('Error:', error));
        });

        function isVisitorCounted() {
            let visited = localStorage.getItem('visited') === 'true';
            if (!visited) {
                localStorage.setItem('visited', 'true');
            }
            return visited;
        }

        function getVisitorCount() {
            let count = localStorage.getItem('visitorCount') || 0;
            return parseInt(count);
        }

        function updateVisitorCount() {
            if (!isVisitorCounted()) {
                let count = getVisitorCount();
                count++;
                localStorage.setItem('visitorCount', count.toString());
                document.getElementById('visitorCount').textContent = count;
            } else {
                document.getElementById('visitorCount').textContent = getVisitorCount();
            }
        }

        // Security measures
        window.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });

        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
