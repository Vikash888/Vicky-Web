    <script>
        async function getClientIp() {
            try {
                let response = await fetch('https://api.ipify.org?format=json');
                let data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching IP address:', error);
                return 'Unable to fetch IP';
            }
        }

        async function getVisitorLocation(ip) {
            try {
                let response = await fetch(`https://ipinfo.io/${ip}/json`);
                let data = await response.json();
                return {
                    country: data.country,
                    city: data.city,
                    latitude: data.loc.split(',')[0],
                    longitude: data.loc.split(',')[1]
                };
            } catch (error) {
                console.error('Error fetching location data:', error);
                return { country: 'Unable to fetch location', city: '', latitude: '', longitude: '' };
            }
        }

        function getVisitorOS() {
            let os = 'Unknown OS';
            if (navigator.appVersion.indexOf("Win") != -1) os = "Windows";
            if (navigator.appVersion.indexOf("Mac") != -1) os = "MacOS";
            if (navigator.appVersion.indexOf("X11") != -1) os = "UNIX";
            if (navigator.appVersion.indexOf("Linux") != -1) os = "Linux";
            return os;
        }

        function getVisitorBrowser() {
            let userAgent = navigator.userAgent;
            let browser = 'Unknown Browser';
            if (userAgent.match(/firefox|fxios/i)) browser = 'Firefox';
            else if (userAgent.match(/chrome|crios/i)) browser = 'Chrome';
            else if (userAgent.match(/safari/i)) browser = 'Safari';
            else if (userAgent.match(/opr\//i)) browser = 'Opera';
            else if (userAgent.match(/edg/i)) browser = 'Edge';
            return browser;
        }

        async function sendVisitorInfoToServer(visitorInfo) {
            try {
                const response = await fetch('YOUR_API_GATEWAY_ENDPOINT', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(visitorInfo)
                });
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                console.log('Data sent successfully:', data);
            } catch (error) {
                console.error('Error sending data to server:', error);
            }
        }

        async function main() {
            const ip = await getClientIp();
            const location = await getVisitorLocation(ip);
            const os = getVisitorOS();
            const browser = getVisitorBrowser();

            const visitorInfo = {
                ip,
                location,
                os,
                browser
            };

            await sendVisitorInfoToServer(visitorInfo);
        }

        main();
    </script>
