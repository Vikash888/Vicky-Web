<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head content remains largely unchanged -->
    <style>
        /* Styles remain unchanged */
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <iframe src="./assets/Loading form/index.html" frameborder="0" style="width: 100%; height: 100%;"></iframe>
    </div>

    <div class="wrapper" style="display: none;" id="mainContent">
        <!-- Header and main content remain unchanged -->

        <!-- Footer -->
        <footer>
            <p>Client IP: <span id="clientIp">Fetching...</span></p>
            <p>Total Visitors: <span id="visitorCount">0</span></p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 1000);
        });

        async function getClientIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching IP address:', error);
                return 'Unable to fetch IP';
            }
        }

        async function getVisitorLocation(ip) {
            try {
                const response = await fetch(`https://ipinfo.io/${ip}/json`);
                const data = await response.json();
                return {
                    country: data.country,
                    city: data.city,
                    latitude: data.loc.split(',')[0],
                    longitude: data.loc.split(',')[1]
                };
            } catch (error) {
                console.error('Error fetching location data:', error);
                return { country: 'Unable to fetch location', city: '', latitude: '', longitude: '' };
            }
        }

        function getVisitorOS() {
            const userAgent = navigator.userAgent;
            if (userAgent.indexOf("Win") !== -1) return "Windows";
            if (userAgent.indexOf("Mac") !== -1) return "MacOS";
            if (userAgent.indexOf("X11") !== -1) return "UNIX";
            if (userAgent.indexOf("Linux") !== -1) return "Linux";
            return "Unknown OS";
        }

        function getVisitorBrowser() {
            const userAgent = navigator.userAgent;
            if (userAgent.match(/firefox|fxios/i)) return 'Firefox';
            if (userAgent.match(/chrome|crios/i)) return 'Chrome';
            if (userAgent.match(/safari/i)) return 'Safari';
            if (userAgent.match(/opr\//i)) return 'Opera';
            if (userAgent.match(/edg/i)) return 'Edge';
            return 'Unknown Browser';
        }

        async function sendVisitorInfoToServer(visitorInfo) {
            try {
                const response = await fetch('YOUR_API_GATEWAY_ENDPOINT', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(visitorInfo)
                });
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                console.log('Data sent successfully:', data);
            } catch (error) {
                console.error('Error sending data to server:', error);
            }
        }

        async function main() {
            const ip = await getClientIp();
            document.getElementById('clientIp').textContent = ip;
            const location = await getVisitorLocation(ip);
            const os = getVisitorOS();
            const browser = getVisitorBrowser();

            const visitorInfo = {
                ip,
                location,
                os,
                browser
            };

            await sendVisitorInfoToServer(visitorInfo);
        }

        main();
    </script>
</body>
</html>
